events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- PORT 80 : REDIRECTION + CHALLENGE CERTBOT ---
    server {
    if ($host = l2-4.ephec-ti.be) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.l2-4.ephec-ti.be) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;
        server_name www.l2-4.ephec-ti.be l2-4.ephec-ti.be;

        # Indispensable pour que Certbot puisse prouver que tu es le proprio
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    



}

    # --- PORT 443 : HTTPS ---
    server {
        listen 443 ssl;
        server_name www.l2-4.ephec-ti.be l2-4.ephec-ti.be;
    ssl_certificate /etc/letsencrypt/live/www.l2-4.ephec-ti.be/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.l2-4.ephec-ti.be/privkey.pem; # managed by Certbot

        root /var/www/html;
        index index.php index.html;

        location / {
            root /var/www/html/www;
            try_files $uri $uri/ =404;
        }

        location /blog {
            alias /var/www/html/blog/;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            root /var/www/html/www;
            include fastcgi_params;
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    

}
}
