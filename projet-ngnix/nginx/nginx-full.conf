events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        server_name www.l2-4.ephec-ti.be l2-4.ephec-ti.be;

        root /var/www/html/www;
        index index.php index.html;

        # Indispensable pour que Certbot puisse fonctionner plus tard
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.l2-4.ephec-ti.be/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.l2-4.ephec-ti.be/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


    server {
    if ($host = l2-4.ephec-ti.be) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.l2-4.ephec-ti.be) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;
        server_name www.l2-4.ephec-ti.be l2-4.ephec-ti.be;
    return 404; # managed by Certbot




}}
