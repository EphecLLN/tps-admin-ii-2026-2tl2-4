server {
    listen 80;
    server_name www.l2-4.ephec-ti.be l2-4.ephec-ti.be;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.l2-4.ephec-ti.be l2-4.ephec-ti.be;

    ssl_certificate /etc/letsencrypt/live/www.l2-4.ephec-ti.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.l2-4.ephec-ti.be/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html/www;
    index index.php index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}


# --- AJOUT TP5 : Virtual Host pour le Blog ---
server {
    listen 80;
    server_name blog.l2-4.ephec-ti.be;
    
    root /var/www/html/blog;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
