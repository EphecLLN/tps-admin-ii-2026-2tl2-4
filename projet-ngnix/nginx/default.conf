server {
    listen 80;
    server_name www.l2-4.ephec-ti.be l2-4.ephec-ti.be;

    root /var/www/html/www;
    index products.php index.php index.html;

    location / {
        try_files $uri $uri/ /products.php;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-app-tp6:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/www$fastcgi_script_name;
    }

    location /projetdev {
        alias /var/www/html/www/projetdev;
        try_files $uri $uri/ /projetdev/index.html;
    }

    # LE BLOC API DOIT ÊTRE ICI, AVANT LA DERNIÈRE ACCOLADE
    location /api/ {
        proxy_pass http://172.17.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
} # <-- CETTE ACCOLADE DOIT FERMER TOUT LE SERVEUR
