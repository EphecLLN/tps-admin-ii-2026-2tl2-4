events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name www.l2-4.ephec-ti.be l2-4.ephec-ti.be;

        # 1. TON NOUVEAU PROJET (Route exacte : projetdev)
        location /projetdev {
            # Le slash à la fin de l'URL proxy_pass est crucial ici
            proxy_pass http://172.17.0.1:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. TON ANCIEN SITE (Tout le reste : /, products.php, etc.)
        location / {
            proxy_pass http://php-app-tp6:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. BACKEND API (Pour les appels de ton projet React)
        location /api/ {
            proxy_pass http://172.17.0.1:3000/api/;
            proxy_set_header Host $host;
        }
    }
}
