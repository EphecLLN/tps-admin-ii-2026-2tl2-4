events {}
http {
    server {
        listen 80;
        server_name www.l2-4.ephec-ti.be;
        index index.php index.html;
        root /var/www/html/www/;
        location ~* \.php$ {
            fastcgi_pass 172.18.0.3:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
}
