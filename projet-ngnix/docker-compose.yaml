services:
  nginx:
    image: nginx:latest
    container_name: nginx-tp6
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./html/www:/var/www/html/www
      - ./html/blog:/var/www/html/blog:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
    networks:
      - frontend
    depends_on:
      - php

  php:
    build: ./php
    container_name: php-tp6
    volumes:
      - ./html/www:/var/www/html/www
    env_file:
      - db.env
    networks:
      - frontend

  mariadb:
    image: mariadb:11.1
    container_name: mariadb-tp6
    env_file:
      - db/root.env
      - db.env
    volumes:
      - ./db/sql/:/docker-entrypoint-initdb.d/
      - ./mysql:/var/lib/mysql
    networks:
      - backend

networks:
  frontend:
    name: tp6_fresh_frontend
  backend:
    name: tp6_fresh_backend
