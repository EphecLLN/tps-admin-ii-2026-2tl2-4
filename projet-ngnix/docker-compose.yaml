services:
  nginx:
    build: ./nginx
    container_name: nginx-tp6
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./html/www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - frontend
    depends_on:
      - php

  php:
    build: ./php
    container_name: php-tp6
    volumes:
      - ./html/www:/var/www/html
    networks:
      - frontend

  mariadb:
    image: mariadb
    container_name: mariadb-tp6
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: woodytoys
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
